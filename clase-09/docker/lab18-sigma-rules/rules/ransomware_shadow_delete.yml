title: Shadow Copy Deletion - Ransomware Indicator
id: c3d48e0f-7a9b-0c1d-4e5f-8b2a0d4c6e7f
status: stable
description: Detects deletion of Volume Shadow Copies which is a strong indicator of ransomware activity
references:
    - https://attack.mitre.org/techniques/T1490/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.impact
    - attack.t1490
logsource:
    category: process_creation
    product: windows
detection:
    selection_vssadmin:
        Image|endswith: '\vssadmin.exe'
        CommandLine|contains|all:
            - 'delete'
            - 'shadows'
    selection_wmic:
        Image|endswith: '\WMIC.exe'
        CommandLine|contains|all:
            - 'shadowcopy'
            - 'delete'
    selection_powershell:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: 'Win32_ShadowCopy'
    condition: selection_vssadmin or selection_wmic or selection_powershell
falsepositives:
    - Legitimate backup software managing shadow copies
    - System administrators performing maintenance
level: critical
