###############################################################################
# LAB 9: Análisis de Procesos con Volatility 3
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 5
# Universidad Mayor - 2026
#
# Descripción: Entorno con Volatility 3 y un memory dump sintético de
# Windows 10 que contiene procesos normales + 3 procesos maliciosos.
# Los estudiantes deben identificar las anomalías.
#
# Uso: docker-compose up -d
# Acceso: docker exec -it vol3-analyst bash
###############################################################################


services:
  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    container_name: vol3-analyst
    volumes:
      - memory-data:/data
      - ./scripts:/scripts:ro
    networks:
      - lab-net
    tty: true
    stdin_open: true
    depends_on:
      generator:
        condition: service_completed_successfully

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: vol3-generator
    volumes:
      - memory-data:/data
    networks:
      - lab-net

volumes:
  memory-data:
    driver: local

networks:
  lab-net:
    driver: bridge
