title: Certutil Used for File Download
id: c7d82f4e-1a3b-4c5d-8e9f-2b6a4d8c0e1f
status: stable
description: Detects certutil.exe being used to download files from remote URLs - a common LOLBin technique
references:
    - https://attack.mitre.org/techniques/T1105/
    - https://lolbas-project.github.io/#/execute
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.command-and-control
    - attack.t1105
    - attack.defense-evasion
    - attack.t1218
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\certutil.exe'
        CommandLine|contains:
            - 'urlcache'
            - '-urlcache'
            - '/urlcache'
    condition: selection
falsepositives:
    - Legitimate certificate operations (rare with urlcache flag)
level: high
