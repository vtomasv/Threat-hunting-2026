title: WMI Remote Process Execution
id: b2c37d9e-6f8a-9b0c-3d4e-7a1f9c3b5d6e
status: stable
description: Detects WMIC being used to execute processes on remote systems - a common lateral movement technique
references:
    - https://attack.mitre.org/techniques/T1047/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.lateral-movement
    - attack.t1047
    - attack.execution
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\WMIC.exe'
        CommandLine|contains:
            - '/node:'
            - 'process call create'
    condition: selection
falsepositives:
    - Legitimate remote administration scripts
    - SCCM/MECM operations
level: high
