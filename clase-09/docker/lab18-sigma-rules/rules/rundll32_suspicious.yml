title: Rundll32 Loading DLL from Suspicious Location
id: b8c9d35e-2f4a-5b6c-9d0e-3a7f5c9b1d2e
status: stable
description: Detects rundll32.exe loading DLLs from user-writable directories or with suspicious export functions
references:
    - https://attack.mitre.org/techniques/T1218/011/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.defense-evasion
    - attack.t1218.011
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\rundll32.exe'
    selection_path:
        CommandLine|contains:
            - '\Users\'
            - '\Temp\'
            - '\AppData\'
            - '\Downloads\'
            - '\ProgramData\'
    condition: selection and selection_path
falsepositives:
    - Legitimate software using rundll32 for DLL execution
    - Printer drivers
level: medium
