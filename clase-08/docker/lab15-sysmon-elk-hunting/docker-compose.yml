###############################################################################
# LAB 15: Hunting Avanzado con Sysmon + ELK Stack
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 8
# Incluye: Dataset sofisticado + Simulador de ataques en vivo + Kibana
###############################################################################

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: sysmon-hunt-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: sysmon-hunt-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: sysmon-hunt-loader
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: sysmon-hunt-sim
    stdin_open: true
    tty: true
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

volumes:
  es-data:

networks:
  elk-net:
    driver: bridge
