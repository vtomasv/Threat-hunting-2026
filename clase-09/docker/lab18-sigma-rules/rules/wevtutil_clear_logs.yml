title: Windows Event Log Cleared via Wevtutil
id: c9d0e46f-3a5b-6c7d-0e1f-4b8a6d0c2e3f
status: stable
description: Detects clearing of Windows event logs using wevtutil - a common anti-forensics technique
references:
    - https://attack.mitre.org/techniques/T1070/001/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.defense-evasion
    - attack.t1070.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\wevtutil.exe'
        CommandLine|contains:
            - 'cl '
            - 'clear-log'
    condition: selection
falsepositives:
    - Legitimate log rotation scripts (should be documented)
level: high
