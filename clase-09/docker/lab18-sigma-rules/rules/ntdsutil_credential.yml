title: NTDS.dit Access via Ntdsutil
id: d0e1f57a-4b6c-7d8e-1f2a-5c9b7e1d3f4a
status: stable
description: Detects ntdsutil being used to create a copy of the Active Directory database for offline credential extraction
references:
    - https://attack.mitre.org/techniques/T1003/003/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.credential-access
    - attack.t1003.003
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ntdsutil.exe'
        CommandLine|contains:
            - 'ifm'
            - 'create full'
            - 'ac i ntds'
    condition: selection
falsepositives:
    - Legitimate Active Directory backup operations
level: critical
