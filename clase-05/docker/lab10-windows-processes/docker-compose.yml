###############################################################################
# LAB 10: Find Evil — Identificar Procesos Maliciosos
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 5
# Universidad Mayor - 2026
#
# Descripción: Segundo escenario de memoria con técnicas más avanzadas:
# process hollowing, DLL injection hints, y procesos con timestamps
# anómalos. Los estudiantes aplican la metodología Find Evil completa.
#
# Uso: docker-compose up -d
# Acceso: docker exec -it findevil-analyst bash
###############################################################################


services:
  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    container_name: findevil-analyst
    volumes:
      - memory-data:/data
      - ./scripts:/scripts:ro
    networks:
      - lab-net
    tty: true
    stdin_open: true
    depends_on:
      generator:
        condition: service_completed_successfully

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: findevil-generator
    volumes:
      - memory-data:/data
    networks:
      - lab-net

volumes:
  memory-data:
    driver: local

networks:
  lab-net:
    driver: bridge
