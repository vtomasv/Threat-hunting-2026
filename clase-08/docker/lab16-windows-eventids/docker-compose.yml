###############################################################################
# LAB 16: Correlación Avanzada de Windows Event IDs
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 8
#
# Uso:
#   docker compose up -d
#   docker exec -it winevt-simulator bash
#
# Servicios:
#   - Elasticsearch (puerto 9200)
#   - Kibana (puerto 5601)
#   - Loader (carga dataset inicial + configura Kibana)
#   - Simulator (contenedor interactivo con simulador de ataques en vivo)
###############################################################################

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: winevt-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    networks:
      - elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: winevt-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  loader:
    build:
      context: .
      dockerfile: Dockerfile.loader
    container_name: winevt-loader
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
    container_name: winevt-simulator
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
    stdin_open: true
    tty: true

networks:
  elk-net:
    driver: bridge
