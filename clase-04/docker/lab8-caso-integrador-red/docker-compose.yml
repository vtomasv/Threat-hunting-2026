###############################################################################
# LAB 8: Caso Integrador - Incidente Multi-Vector en Red
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 4
# Universidad Mayor - 2026
#
# Descripción: Caso forense completo que integra todas las técnicas de la
# Unidad 2. Simula un ataque APT con múltiples vectores: escaneo, exploit,
# reverse shell, file upload, LFI, y exfiltración DNS.
#
# EVALUACIÓN PARCIAL 1 (30% de la nota final)
#
# Uso: docker-compose up -d
# Acceso: docker exec -it caso-integrador-analyst bash
###############################################################################


services:
  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    container_name: caso-integrador-analyst
    volumes:
      - pcap-data:/data
      - ./scripts:/scripts:ro
      - ./plantilla:/plantilla:ro
    networks:
      - lab-net
    tty: true
    stdin_open: true
    depends_on:
      generator:
        condition: service_completed_successfully

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: caso-integrador-generator
    volumes:
      - pcap-data:/data
    networks:
      - lab-net

volumes:
  pcap-data:
    driver: local

networks:
  lab-net:
    driver: bridge
