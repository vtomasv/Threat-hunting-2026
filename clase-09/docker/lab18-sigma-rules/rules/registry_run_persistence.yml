title: Registry Run Key Modification for Persistence
id: e5f6a02b-9c1d-2e3f-6a7b-0d4c2f6e8a9b
status: stable
description: Detects modification of registry Run keys to establish persistence using reg.exe
references:
    - https://attack.mitre.org/techniques/T1547/001/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\reg.exe'
        CommandLine|contains|all:
            - 'add'
            - 'CurrentVersion\Run'
    condition: selection
falsepositives:
    - Legitimate software installation
    - Group Policy scripts
level: medium
