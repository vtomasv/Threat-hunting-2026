title: DNS Query to Suspicious TLD or Known Malicious Domain
id: f0a15b7c-4d6e-7f8a-1b2c-5e9d7a1f3b4c
status: stable
description: Detects DNS queries to known suspicious TLDs or domains associated with malware infrastructure
references:
    - https://attack.mitre.org/techniques/T1071/004/
    - https://attack.mitre.org/techniques/T1568/002/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.command-and-control
    - attack.t1071.004
logsource:
    category: dns_query
    product: windows
detection:
    selection_tld:
        QueryName|endswith:
            - '.xyz'
            - '.top'
            - '.tk'
            - '.ml'
            - '.ga'
            - '.cf'
            - '.buzz'
            - '.icu'
    selection_known_bad:
        QueryName|contains:
            - 'evil-corp'
            - 'malware-c2'
            - 'darknet'
            - 'cobaltstrike'
    condition: selection_tld or selection_known_bad
falsepositives:
    - Legitimate websites using .xyz TLD
    - Security research tools
level: medium
