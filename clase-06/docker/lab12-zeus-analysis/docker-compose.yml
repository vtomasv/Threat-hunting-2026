###############################################################################
# LAB 12: Análisis de Zeus Botnet en Memoria
# Curso MAR404 - Cacería de Amenazas (Threat Hunter) - Clase 6
#
# Descripción: Dataset simulando memory dump infectado con Zeus/Zbot.
# Incluye inyección en explorer.exe, API hooks, configuración cifrada
# y conexiones C2.
#
# Uso: docker-compose up -d
# Acceso: docker exec -it zeus-analyst bash
###############################################################################


services:
  analyst:
    build:
      context: .
      dockerfile: Dockerfile.analyst
    container_name: zeus-analyst
    volumes:
      - memory-data:/data
      - ./scripts:/scripts:ro
    networks:
      - lab-net
    tty: true
    stdin_open: true
    depends_on:
      generator:
        condition: service_completed_successfully

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    container_name: zeus-generator
    volumes:
      - memory-data:/data
    networks:
      - lab-net

volumes:
  memory-data:
    driver: local

networks:
  lab-net:
    driver: bridge
