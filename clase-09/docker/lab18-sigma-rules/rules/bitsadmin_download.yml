title: BITSAdmin Used for File Download
id: d4e59f1a-8b0c-1d2e-5f6a-9c3b1e5d7f8a
status: stable
description: Detects bitsadmin.exe being used to download files - a LOLBin technique for stealthy file transfers
references:
    - https://attack.mitre.org/techniques/T1197/
    - https://attack.mitre.org/techniques/T1105/
author: MAR404 Course
date: 2025/07/20
tags:
    - attack.defense-evasion
    - attack.t1197
    - attack.command-and-control
    - attack.t1105
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\bitsadmin.exe'
        CommandLine|contains:
            - '/transfer'
            - '/addfile'
    selection_url:
        CommandLine|contains:
            - 'http://'
            - 'https://'
    condition: selection and selection_url
falsepositives:
    - Legitimate BITS transfers by Windows Update
    - SCCM/MECM content distribution
level: medium
